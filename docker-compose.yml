services:
  postgres:
    image: postgres:16
    container_name: whoshere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whoshere
      POSTGRES_USER: whoshere_user
      POSTGRES_PASSWORD: whoshere_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whoshere_user -d whoshere"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
